---
layout: default
---
<article style="max-width: 800px; margin: auto; padding: 20px;">
  <header>
    <h1>{{ page.title }}</h1>
    <p style="color: #888;"><em>Published on {{ page.date | date: "%B %d, %Y" }}</em></p>
  </header>
  
  <hr style="border: 0; border-top: 1px solid #333;">
  
  <div class="post-content">
    {{ content }}
  </div>

  <hr style="border: 0; border-top: 1px solid #333; margin-top: 40px;">
  <a href="/" style="color: #81a1c1;">← Back to Home</a>
</article>
