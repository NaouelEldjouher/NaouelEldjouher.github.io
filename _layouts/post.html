---
layout: none
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title }} — Naouel Eldjouher</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0e0e0e;
      --border:  #242424;
      --accent:  #4ade80;
      --text:    #e2e2e2;
      --dim:     #888;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Inter', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; line-height: 1.7; font-size: 15px; }
    a { color: inherit; text-decoration: none; }
 
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(14,14,14,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 760px; margin: 0 auto; padding: 0 24px; height: 52px; display: flex; justify-content: space-between; align-items: center; }
    .nav-name { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); }
    .back-link { font-family: var(--mono); font-size: 0.78rem; color: var(--dim); transition: color 0.15s; }
    .back-link:hover { color: var(--text); }
 
    .page { max-width: 680px; margin: 0 auto; padding: 100px 24px 80px; }
 
    .post-meta { font-family: var(--mono); font-size: 0.7rem; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
    .post-title { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 300; color: #fff; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 12px; }
    .post-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 48px; padding-bottom: 48px; border-bottom: 1px solid var(--border); }
    .tag { font-family: var(--mono); font-size: 0.68rem; color: var(--accent); border: 1px solid rgba(74,222,128,0.25); padding: 3px 10px; border-radius: 2px; }
 
    .post-content { color: var(--dim); line-height: 1.85; }
    .post-content p { margin-bottom: 20px; }
    .post-content h2 { font-size: 1.1rem; font-weight: 500; color: #fff; margin: 36px 0 14px; }
    .post-content h3 { font-size: 0.95rem; font-weight: 500; color: var(--text); margin: 28px 0 10px; }
    .post-content strong { color: var(--text); font-weight: 500; }
    .post-content code { font-family: var(--mono); font-size: 0.82rem; background: #161616; border: 1px solid var(--border); padding: 2px 7px; border-radius: 3px; color: var(--accent); }
    .post-content pre { background: #161616; border: 1px solid var(--border); border-radius: 4px; padding: 20px; overflow-x: auto; margin: 20px 0; }
    .post-content pre code { background: none; border: none; padding: 0; font-size: 0.8rem; color: var(--text); }
    .post-content ul, .post-content ol { padding-left: 20px; margin-bottom: 20px; }
    .post-content li { margin-bottom: 6px; }
    .post-content a { color: var(--accent); border-bottom: 1px solid rgba(74,222,128,0.3); transition: border-color 0.15s; }
    .post-content a:hover { border-color: var(--accent); }
    .post-content blockquote { border-left: 2px solid var(--accent); padding-left: 20px; margin: 24px 0; color: var(--dim); font-style: italic; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 36px 0; }
 
    .post-footer { margin-top: 64px; padding-top: 32px; border-top: 1px solid var(--border); }
    .back-btn { font-family: var(--mono); font-size: 0.75rem; color: var(--dim); border: 1px solid var(--border); padding: 8px 18px; border-radius: 3px; display: inline-block; transition: all 0.15s; }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
 
<nav>
  <div class="nav-inner">
    <span class="nav-name">naouel.dev</span>
    <a href="/" class="back-link">← Home</a>
  </div>
</nav>
 
<div class="page">
  <div class="post-meta">{{ page.date | date: "%B %d, %Y" }} &nbsp;·&nbsp; OmniDomain Build Log</div>
  <h1 class="post-title">{{ page.title }}</h1>
  {% if page.tags %}
  <div class="post-tags">
    {% for tag in page.tags %}
    <span class="tag">{{ tag }}</span>
    {% endfor %}
  </div>
  {% endif %}
  <div class="post-content">
    {{ content }}
  </div>
  <div class="post-footer">
    <a href="/" class="back-btn">← Back to Home</a>
  </div>
</div>
 
</body>
</html>
