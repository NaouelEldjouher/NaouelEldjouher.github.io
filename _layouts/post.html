---
layout: default
---
<style>
  body {
    background-color: #121212 !important;
    color: #e0e0e0 !important;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  a { color: #81a1c1 !important; text-decoration: none; }
  a:hover { text-decoration: underline; }
  hr { border-color: #333 !important; }
  code { background-color: #2e3440 !important; color: #eceff4 !important; padding: 2px 6px; border-radius: 4px; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 20px; color: #e0e0e0; }
  th, td { border: 1px solid #444; padding: 10px; text-align: left; }
  th { background-color: #1e1e1e; }
</style>

<article style="max-width: 800px; margin: auto; padding: 20px;">
  <h1>{{ page.title }}</h1>
  <p style="color: #888;"><em>Published: {{ page.date | date: "%B %d, %Y" }}</em></p>
  <hr>
  <div class="content" style="line-height: 1.6;">{{ content }}</div>
  <hr>
  <a href="/">← Back to Home</a>
</article>
